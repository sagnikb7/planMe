services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5001"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5001
      MONGO_URI: mongodb://mongo:27017/planme
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_SESSIONS_PER_USER: ${MAX_SESSIONS_PER_USER:-3}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@planme.app}

volumes:
  mongo_data:
